<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekspressdata</title>
  <script>
    (function() {
      var langs = navigator.languages || [navigator.language || ''];
      for (var i = 0; i < langs.length; i++) {
        var l = langs[i].toLowerCase();
        if (l.startsWith('en')) { window.location.replace('index-en.html'); break; }
        if (l.startsWith('no') || l.startsWith('nb') || l.startsWith('nn')) { break; }
      }
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #f8f7f4;
      padding: 4rem 1.5rem;
    }

    .page {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      margin-bottom: 0.2rem;
    }

    .subtitle {
      color: #666;
      font-style: italic;
      margin-bottom: 3rem;
    }

    h2 {
      font-size: 0.8rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #888;
      margin-top: 3rem;
      margin-bottom: 1rem;
    }

    p {
      margin-bottom: 1.2rem;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      padding: 0.3rem 0;
      border-bottom: 1px solid #e8e6e1;
    }

    ul li:last-child {
      border-bottom: none;
    }

    .result {
      margin-bottom: 1.8rem;
    }

    .result .label {
      font-size: 0.95rem;
      font-style: italic;
      color: #555;
      margin-bottom: 0.2rem;
    }

    .contact a {
      color: #1a1a1a;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 3rem 0;
    }
  </style>
</head>
<body>
<div class="page">

  <h1>Ekspressdata</h1>
  <ul>    
    <li>ETL og datatransformasjon</li>
    <li>Programmering</li>
    <li>Dashbord og visuell rapportering</li>
    <li>Kvalitetskontroll</li>
    <li>Matrikkelføring</li>
  </ul>



</div>
</body>
</html>
